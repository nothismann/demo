name: Extract replacement villa 1

on:
  push:
    paths:
      - '.github/workflows/extract-new-villa1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Extract listing data
        run: |
          python - <<'PY'
          import asyncio, json, re
          from pathlib import Path
          from urllib.parse import unquote
          from playwright.async_api import async_playwright

          URL='https://www.airbnb.com.tw/rooms/1455709683965415928?check_in=2026-09-24&check_out=2026-09-27&guests=1&adults=5&s=67&unique_share_id=9cf451b2-6e75-4b41-b71c-dcff0673eb1b'

          async def main():
              async with async_playwright() as p:
                  browser=await p.chromium.launch(headless=True)
                  page=await browser.new_page(viewport={'width':1440,'height':1600},user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131 Safari/537.36')
                  await page.goto(URL,wait_until='domcontentloaded',timeout=120000)
                  await page.wait_for_timeout(12000)
                  for y in (1200,2200,3200,0):
                      await page.evaluate(f'window.scrollTo(0,{y})')
                      await page.wait_for_timeout(1800)

                  text=await page.locator('body').inner_text()
                  title=await page.title()
                  html=await page.content()
                  urls=[]
                  dom=await page.locator('img').evaluate_all('''imgs=>imgs.flatMap(i=>[i.src,i.currentSrc,...(i.srcset||'').split(',').map(x=>x.trim().split(' ')[0])]).filter(Boolean)''')
                  urls.extend(dom)
                  for pat in [r'https://a0\.muscache\.com/im/pictures[^"\\\s<]+',r'https:\\/\\/a0\.muscache\.com\\/im\\/pictures[^"\s<]+']:
                      for m in re.findall(pat,html): urls.append(m.replace('\\/','/'))
                  resources=await page.evaluate('performance.getEntriesByType("resource").map(x=>x.name)')
                  urls.extend(resources)
                  clean=[];seen=set()
                  for raw in urls:
                      u=unquote(str(raw)).replace('\\u002F','/').replace('\\/','/')
                      if 'a0.muscache.com/im/pictures/hosting/Hosting-1455709683965415928/' not in u and 'a0.muscache.com/im/pictures/miso/Hosting-1455709683965415928/' not in u:
                          continue
                      u=u.split('&amp;')[0]
                      u=u.split('?')[0]+'?im_w=1200'
                      if u not in seen:
                          seen.add(u);clean.append(u)
                  out=Path('pattaya-villa-comparison-final')
                  out.mkdir(exist_ok=True)
                  (out/'new-villa1-images.json').write_text(json.dumps(clean[:30],ensure_ascii=False,indent=2),encoding='utf-8')
                  (out/'new-villa1-text.txt').write_text(title+'\n\n'+text,encoding='utf-8')
                  (out/'new-villa1-debug.html').write_text(html,encoding='utf-8')
                  print('TITLE',title)
                  print('IMAGES',len(clean))
                  print(text[:12000])
                  await browser.close()

          asyncio.run(main())
          PY
      - name: Commit extracted data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pattaya-villa-comparison-final/new-villa1-*
          git commit -m 'Extract replacement villa 1 data' || exit 0
          git push
