name: Extract villa 3 images

on:
  push:
    paths:
      - '.github/workflows/extract-villa3-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Extract Airbnb image URLs
        run: |
          python - <<'PY'
          import asyncio, json, re
          from pathlib import Path
          from urllib.parse import unquote
          from playwright.async_api import async_playwright

          URL = 'https://www.airbnb.com.tw/rooms/1693434019336117520?check_in=2026-09-24&check_out=2026-09-27&guests=1&adults=5&s=67&unique_share_id=28054f59-8b16-4c6f-94bc-3637112fb61c'

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page(
                      viewport={'width': 1440, 'height': 1200},
                      user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131 Safari/537.36'
                  )
                  await page.goto(URL, wait_until='domcontentloaded', timeout=120000)
                  await page.wait_for_timeout(12000)

                  # Try to reveal the photo grid if Airbnb renders it lazily.
                  try:
                      await page.mouse.wheel(0, 1800)
                      await page.wait_for_timeout(4000)
                      await page.mouse.wheel(0, -1800)
                      await page.wait_for_timeout(2000)
                  except Exception:
                      pass

                  urls = []

                  # DOM image URLs and srcsets.
                  dom_urls = await page.locator('img').evaluate_all('''imgs => imgs.flatMap(img => {
                    const values = [img.src, img.currentSrc, img.getAttribute('data-original-uri')];
                    const srcset = img.srcset || '';
                    srcset.split(',').forEach(x => values.push(x.trim().split(' ')[0]));
                    return values.filter(Boolean);
                  })''')
                  urls.extend(dom_urls)

                  # URLs embedded in page scripts / JSON.
                  html = await page.content()
                  patterns = [
                      r'https://a0\.muscache\.com/im/pictures[^"\\\s<]+',
                      r'https:\\/\\/a0\.muscache\.com\\/im\\/pictures[^"\s<]+'
                  ]
                  for pat in patterns:
                      for match in re.findall(pat, html):
                          urls.append(match.replace('\\/', '/'))

                  # Network resources.
                  resources = await page.evaluate('performance.getEntriesByType("resource").map(x => x.name)')
                  urls.extend(resources)

                  cleaned = []
                  seen = set()
                  for raw in urls:
                      if not raw:
                          continue
                      u = unquote(str(raw)).replace('\\u002F', '/').replace('\\/', '/')
                      if 'a0.muscache.com/im/pictures' not in u:
                          continue
                      u = u.split('&amp;')[0]
                      if '?' in u:
                          base = u.split('?')[0]
                          u = base + '?im_w=1200'
                      else:
                          u = u + '?im_w=1200'
                      if u not in seen:
                          seen.add(u)
                          cleaned.append(u)

                  Path('pattaya-villa-comparison').mkdir(exist_ok=True)
                  Path('pattaya-villa-comparison/villa3-images.json').write_text(
                      json.dumps(cleaned[:20], ensure_ascii=False, indent=2), encoding='utf-8'
                  )
                  Path('pattaya-villa-comparison/villa3-debug.html').write_text(html, encoding='utf-8')
                  print(f'Found {len(cleaned)} Airbnb image URLs')
                  for u in cleaned[:10]:
                      print(u)
                  await browser.close()

          asyncio.run(main())
          PY

      - name: Commit extracted URLs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pattaya-villa-comparison/villa3-images.json pattaya-villa-comparison/villa3-debug.html
          git commit -m 'Extract Airbnb villa 3 image URLs' || exit 0
          git push
