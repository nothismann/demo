"html":{"__typename":"Html","htmlText":"为了确保您拥有一个安全、舒适的居住体验，请您仔细阅读以下规则：\n1、入住与退房时间  \n（1）入住时间：15:00 后  \n（2）退房时间：12:00 前  \n如需提前入住或延迟退房，请至少提前一天联系确认（视房态安排）  \n延时费用：  \n（1）每小时：1000泰铢  \n（2）延时两小时：3000泰铢（最多2小时）  \n（3）超过两小时：按全天房费收取  \n2、安全与访客管理  \n（1）夜间休息前请确认门窗已锁好  \n（2）入住期间，可能会有泳池清洁或服务人员进入公共区域进行维护（不会进入房间内部）  \n（3）未经确认，请勿允许任何陌生人进入别墅。如有人以“维修设备”“检查设施”等名义要求进入，请务必先联系房东确认  \n（4）如客人自行带未登记人员进入别墅，由此产生的任何风险（包括但不限于物品遗失、损坏或安全问题），房东概不承担责任，相关责任由客人自行承担  \n（5）重要物品请随身保管，不要遗留在别墅内，请妥善保管个人物品，如有遗失或损坏需自行承担  \n\n3、吸烟与行为规范  \n（1）请在指定室外区域吸烟，室内禁止吸烟（违者收取5000泰铢清洁费）  \n（2）严禁在别墅内从事任何违法行为或使用违禁物品  \n（3）请理性饮酒，避免酗酒或酒后失控行为。如因酗酒导致的任何问题（包括但不限于财物损坏、人员受伤、扰民等），相关责任由客人自行承担\n\n4、设施与日用品  \n（1）入室请脱鞋，保持室内整洁  \n（2）提供基础日用品：12瓶500ml饮用水（只在入住当天提供）、一次性牙刷、洗发水、沐浴露、卫生纸、抽纸、洗洁精  每间卧室配置2条毛巾和2条浴巾\n（3）不提供厨房调料等食品，以及其他未列明的生活用品  \n如您有额外生活用品需求，请自行准备或购买  \n\n5、布草与清洁服务  \n本条款适用于床单、被套、毛巾、浴巾等所有布草及清洁服务：  \n（1）使用规范：  \n请勿用于擦拭化妆品、染发剂、油渍或地面清洁等。如出现严重污损或无法恢复，将收取清洁或更换费用。布草为房源配置物品，请勿丢弃或带走。如发生丢失、丢弃或无法回收的情况，将按实际更换成本收取费用  \n（2）更换与清洁：  \n① 入住期间可提供每日免费基础清洁服务（需提前预约时间），包含公共区域清洁及垃圾清理  \n② 不提供单独更换毛巾或浴巾服务，如需更换布草，需按整套更换（含所有房间的床单、毛巾、浴巾，地巾），布草整套更换费用为700泰铢/次  \n\n6、噪音与邻里  \n（1）安静时段：21:00 – 次日09:00  \n（2）请避免大声喧哗或播放高音量音乐，以免影响周边邻居  \n\n7、用电与设备使用  \n（1）请勿使用大功率电器  \n（2）请勿自行操作设备系统  \n（3）泳池为自动循环系统，请勿随意调整  \n（4）因不当使用造成设备损坏或故障，需由客人承担相关责任  \n\n8、泳池使用  \n（1）泳池每周会定期进行清洁与维护两次  \n（2）地面湿滑，请注意安全  \n（3）水深约1.4–1.7米  \n（4）儿童必须在成人陪同下使用  \n（5）未经房东允许，请勿自行调整泳池泵房设备  \n（6）请保持泳池清洁，请勿向泳池内丢弃任何垃圾（如烟头、食物残渣等）。如因违规使用造成水质污染或设备损坏，将根据实际清洁及维修费用进行扣费  \n泳池使用为客人自行行为，请根据自身情况合理使用并注意安全。如因未遵守安全提示或不当使用导致的意外或风险（包括但不限于滑倒、受伤等），相关责任由客人自行承担","recommendedNumberOfLines":5,"minimumNumberOfLinesForTruncation":5,"readMoreButton":{"__typename":"Button","accessibilityLabel":null,"title":"顯示更多","loggingData":{"__typename":"LoggingEventData","loggingId":"pdp.policies.duringYourStay.additionalRules"}}}}]},{"__typename":"GeneralListContentSection","title":"離開前","loggingEventData":{"__typename":"LoggingEventData","loggingId":"pdp.policies.beforeYouLeave"},"items":[{"__typename":"BasicListItem","title":"其他要求","subtitle":"1、退房时间  \n（1）退房时间：中午12:00前  \n（2）如需延迟退房，请提前联系管家确认（视房态安排）  \n2、钥匙与门禁（如钥匙丢失或被带走，需要赔偿1200泰铢）  \n       请将钥匙放回密码盒或交给工作人员  \n3、房间与布草  \n（1）已使用的床品无需整理  \n（2）请勿带走布草及房内物品  \n4、垃圾与卫生\n（1）生活垃圾请放入垃圾桶或指定位置  \n（2）厨房使用后请简单整理并清洗餐具  \n（3）如有严重污渍或特殊情况，请提前告知管家  \n5、费用与责任  \n如有物品损坏或遗失，将按实际维修或更换费用收取  \n。小件物品（例如杯子，碗盘，小摆件等）损坏只需要告知，不需要赔付。\n6、退房确认  \n（1）离开后请告知管家已退房  \n（2）请检查个人物品，避免遗留  \n（3）如有遗留，请及时联系，我们会协助寻找，但不保证一定找回","icon":"SYSTEM_NOTE_PAPER","loggingEventData":{"__typename":"LoggingEventData","loggingId":"pdp.policies.beforeYouLeave.additionalRequest"},"html":null}]}],"safetyAndPropertySubtitle":"詳閱房源的重要細節，避免遇到意料之外的情況。","safetyAndPropertiesTranslationDisclaimer":null,"safetyAndPropertiesSections":[{"__typename":"GeneralListContentSection","title":"安全設備","loggingEventData":null,"items":[{"__typename":"BasicListItem","loggingEventData":null,"title":"房源的戶外監視錄影器","subtitle":"「为了保障您的安全，本别墅入口及庭院设有室外监控摄像头，仅用于安全防护，不拍摄室内或私人活动」","icon":"SYSTEM_SURVEILLANCE","html":null},{"__typename":"BasicListItem","loggingEventData":null,"title":"未安裝一氧化碳警報器","subtitle":null,"icon":"SYSTEM_NO_DETECTOR_CO2","html":null},{"__typename":"BasicListItem","loggingEventData":null,"title":"未安裝煙霧警報器","subtitle":null,"icon":"SYSTEM_NO_DETECTOR_SMOKE","html":null}]}],"importantInformationTitle":null,"importantInformationSubtitles":null,"importantInformationContent":null,"propertyLicenseTextList":null,"enableCombinedThingsToKnowLayout":true,"businessDetails":null,"seeBusinessDetailsCtaCopy":null}},{"__typename":"SectionContainer","id":"U2VjdGlvbkNvbnRhaW5lcjotMTEyNzQ0NjY0NjIxNTIxNDM4","sectionComponentType":"CANCELLATION_POLICY_PICKER_MODAL","sectionContentStatus":"NOT_COMPLETE","sectionId":"CANCELLATION_POLICY_PICKER_MODAL","errors":null,"sectionDependencies":["CHECK_IN","CHECK_OUT","BOOKING"],"enableDependencies":null,"disableDependencies":null,"loggingData":{"__typename":"LoggingEventData","loggingId":"pdp_platform.cancellation_policy_picker_modal","experiments":[],"eventData":{"productId":"U3RheUxpc3Rpbmc6MTY5MzQzNDAx
